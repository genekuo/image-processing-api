services:
  image-processing-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - APP_MAX_SOURCE_SIZE=52428800
      - APP_CACHE_TTL=PT5M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
